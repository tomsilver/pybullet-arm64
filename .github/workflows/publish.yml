name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels
        shell: bash
        run: |
          mkdir -p wheelhouse
          for pyver in 3.10 3.11 3.12 3.13; do
            echo "==> Building wheel for Python ${pyver}..."
            rm -rf build/
            uv build --python "${pyver}" --wheel --out-dir wheelhouse
          done

      - name: Test wheels
        shell: bash
        run: |
          for pyver in 3.10 3.11 3.12 3.13; do
            whl=$(ls wheelhouse/*-cp${pyver/./}-*.whl 2>/dev/null | head -1)
            if [[ -n "$whl" ]]; then
              echo "==> Testing ${whl} with Python ${pyver}..."
              uv run --python "${pyver}" --with "${whl}" --no-project \
                python -c "import pybullet as p; c = p.connect(p.DIRECT); p.disconnect(); print('OK')"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build-linux:
    name: Build and test on Linux
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build and repair wheels
        run: |
          mkdir -p wheelhouse
          for pybin in /opt/python/cp31{0,1,2,3}-*/bin; do
            echo "==> Building with ${pybin}..."
            rm -rf build/
            "${pybin}/pip" wheel . --no-deps -w raw_wheels/
          done
          for whl in raw_wheels/*.whl; do
            echo "==> Repairing ${whl}..."
            auditwheel repair "$whl" --plat manylinux_2_28_x86_64 -w wheelhouse
          done

      - name: Test wheels
        run: |
          for pybin in /opt/python/cp31{0,1,2,3}-*/bin; do
            pyver=$("${pybin}/python" -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
            cpver="cp${pyver/./}"
            whl=$(ls wheelhouse/*-${cpver}-*.whl 2>/dev/null | head -1)
            if [[ -n "$whl" ]]; then
              echo "==> Testing ${whl}..."
              "${pybin}/pip" install "${whl}"
              "${pybin}/python" -c "import pybullet as p; c = p.connect(p.DIRECT); p.disconnect(); print('OK')"
              "${pybin}/pip" uninstall -y pybullet-arm64
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          path: ./wheelhouse/*.whl

  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
