name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install numpy
        run: python -m pip install numpy

      - name: Build and install
        run: python -m pip install -v .

      - name: Test import and basic functionality
        run: |
          python -c "
          import pybullet as p
          physics_client = p.connect(p.DIRECT)
          p.setGravity(0, 0, -10)
          print('pybullet version:', p.getAPIVersion())
          print('gravity:', p.getPhysicsEngineParameters()['gravityAccelerationX'],
                p.getPhysicsEngineParameters()['gravityAccelerationY'],
                p.getPhysicsEngineParameters()['gravityAccelerationZ'])
          p.disconnect()
          print('All tests passed!')
          "

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: [test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels
        shell: bash
        run: |
          mkdir -p wheelhouse
          for pyver in 3.10 3.11 3.12 3.13; do
            echo "==> Building wheel for Python ${pyver}..."
            rm -rf build/
            uv build --python "${pyver}" --wheel --out-dir wheelhouse
          done

      - name: Test wheels
        shell: bash
        run: |
          for pyver in 3.10 3.11 3.12 3.13; do
            whl=$(ls wheelhouse/*-cp${pyver/./}-*.whl 2>/dev/null | head -1)
            if [[ -n "$whl" ]]; then
              echo "==> Testing ${whl} with Python ${pyver}..."
              uv run --python "${pyver}" --with "${whl}" --no-project \
                python -c "import pybullet as p; c = p.connect(p.DIRECT); p.disconnect(); print('OK')"
            fi
          done

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
